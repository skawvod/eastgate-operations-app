<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Ops Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#fff;height:100vh;overflow:hidden;}
.app{display:flex;height:100vh;}
.sidebar{width:210px;min-width:210px;background:#f8f8f7;border-right:1px solid #e5e4e0;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-logo{padding:12px 14px 10px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e5e4e0;}
.logo-icon{width:28px;height:28px;background:#7F77DD;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0;}
.sec-label{padding:12px 14px 3px;font-size:10px;color:#aaa;letter-spacing:.07em;text-transform:uppercase;}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:13px;color:#555;cursor:pointer;border-left:2px solid transparent;background:none;border-top:none;border-right:none;border-bottom:none;width:100%;text-align:left;font-family:inherit;}
.nav-btn:hover{background:#f0f0ee;color:#1a1a1a;}
.nav-btn.active{background:#fff;color:#1a1a1a;font-weight:500;border-left-color:#7F77DD;}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.sidebar-user{padding:10px 12px;margin-top:auto;border-top:1px solid #e5e4e0;display:flex;align-items:center;gap:8px;}
.sidebar-user-name{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sidebar-user-role{font-size:10px;color:#aaa;}
.btn-signout{padding:3px 8px;border:1px solid #d5d4d0;border-radius:6px;background:#fff;color:#555;font-size:11px;cursor:pointer;font-family:inherit;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.topbar{display:flex;flex-direction:column;border-bottom:1px solid #e5e4e0;background:#fff;flex-shrink:0;}
.topbar-r1{display:flex;align-items:center;padding:10px 18px;gap:8px;width:100%;}
.topbar-r2{display:none;} /* shown on mobile via JS */
.topbar-title{font-size:15px;font-weight:600;flex:0 0 auto;}
.topbar-right{display:flex;gap:6px;align-items:center;margin-left:auto;}
.topbar-mobile-right{display:none;margin-left:auto;gap:8px;align-items:center;}
/* profile avatar button in topbar */
.topbar-av-btn{width:34px;height:34px;border-radius:50%;border:2px solid #e5e4e0;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0;flex-shrink:0;transition:border-color .15s;}
.topbar-av-btn:hover{border-color:#7F77DD;}
/* profile popup */
#profile-popup{display:none;position:fixed;background:#fff;border:1px solid #e5e4e0;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.18);z-index:910;overflow:hidden;min-width:210px;}
.profile-popup-header{padding:14px 18px 10px;border-bottom:1px solid #f0eeea;}
.profile-popup-name{font-size:15px;font-weight:700;color:#1a1a1a;}
.profile-popup-role{font-size:12px;color:#888;margin-top:2px;}
.profile-popup-btn{display:flex;align-items:center;gap:12px;padding:13px 18px;width:100%;border:none;background:none;cursor:pointer;font-family:inherit;font-size:15px;color:#1a1a1a;text-align:left;}
.profile-popup-btn:hover{background:#f8f7f5;}
.profile-popup-btn.danger{color:#ef4444;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border:1px solid #d5d4d0;border-radius:6px;background:#fff;color:#1a1a1a;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn:hover{background:#f8f8f7;}
.btn-primary{background:#7F77DD;border-color:#7F77DD;color:#fff;}
.btn-primary:hover{background:#6b63c9;}
.btn-sm{padding:3px 8px;font-size:11px;}
.btn-ghost{border:none;background:none;color:#7F77DD;cursor:pointer;font-size:12px;font-family:inherit;padding:3px 6px;}
.btn-ghost:hover{text-decoration:underline;}
.view-toggle{display:flex;border:1px solid #d5d4d0;border-radius:6px;overflow:hidden;}
.vt-btn{padding:4px 10px;font-size:12px;cursor:pointer;background:#fff;border:none;font-family:inherit;color:#666;}
.vt-btn.active{background:#7F77DD;color:#fff;}
.guesty-strip{flex-shrink:0;border-bottom:1px solid #e5e4e0;background:#fafaf9;padding:0 18px;display:none;}
.guesty-header{display:flex;align-items:center;gap:6px;padding:7px 0 5px;font-size:12px;color:#666;flex-wrap:wrap;}
.guesty-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;}
.guesty-dot.loading{background:#eab308;}.guesty-dot.error{background:#ef4444;}
.guesty-stats{display:flex;gap:16px;}
.gstat{display:flex;align-items:baseline;gap:4px;}
.gstat-n{font-size:15px;font-weight:500;color:#1a1a1a;}.gstat-l{font-size:11px;color:#888;}
.cal-strip{display:flex;gap:5px;padding:5px 0 9px;overflow-x:auto;}
.cal-day{min-width:78px;border:1px solid #e5e4e0;border-radius:7px;padding:5px 7px;background:#fff;flex-shrink:0;}
.cal-day.today{border-color:#7F77DD;}
.cal-dn{font-size:10px;color:#aaa;margin-bottom:1px;}.cal-dd{font-size:13px;font-weight:500;margin-bottom:3px;}
.cal-day.today .cal-dd{color:#7F77DD;}
.cal-ev{font-size:10px;padding:2px 4px;border-radius:3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-in{background:#dcfce7;color:#166534;}.ev-out{background:#fee2e2;color:#991b1b;}
.guesty-error{font-size:11px;color:#999;padding:3px 0 8px;font-style:italic;}
.content{flex:1;overflow-y:auto;padding:16px 18px;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.filter-chip{padding:4px 12px;border:1px solid #d5d4d0;border-radius:99px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit;}
.filter-chip.active{background:#7F77DD;border-color:#7F77DD;color:#fff;}
.sel{padding:4px 8px;border:1px solid #d5d4d0;border-radius:6px;font-size:12px;color:#555;background:#fff;font-family:inherit;}
.board{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:8px;}
.kcol{background:#f8f8f7;border-radius:10px;padding:10px;min-width:220px;max-width:260px;flex-shrink:0;}
.kcol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.kcol-title{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:5px;}
.sdot{width:7px;height:7px;border-radius:50%;}
.kcnt{background:#fff;border:1px solid #e5e4e0;border-radius:99px;font-size:10px;color:#888;padding:1px 6px;}
.card{background:#fff;border:1px solid #e5e4e0;border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:#c0bfbb;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:5px;}
.tag{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;}
.tag-prop{background:#eeecff;color:#534AB7;}.tag-blue{background:#dbeafe;color:#1e40af;}
.tag-green{background:#dcfce7;color:#166534;}.tag-yellow{background:#fef3c7;color:#92400e;}
.tag-red{background:#fee2e2;color:#991b1b;}.tag-gray{background:#f1f5f9;color:#475569;}
.tag-orange{background:#ffedd5;color:#9a3412;}.tag-purple{background:#f3e8ff;color:#7e22ce;}
.due{font-size:10px;color:#999;}.due.overdue{color:#dc2626;}
.avatar{width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
.av-a{background:#e0e7ff;color:#3730a3;}.av-b{background:#dcfce7;color:#166534;}.av-c{background:#fef3c7;color:#92400e;}.av-d{background:#fce7f3;color:#9d174d;}.av-e{background:#dbeafe;color:#1e40af;}
.list-view{display:flex;flex-direction:column;gap:0;}
.list-item{background:#fff;border:1px solid #e5e4e0;border-radius:8px;padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s;}
.list-item:hover{border-color:#c0bfbb;}
.list-item-main{flex:1;min-width:0;}
.list-item-title{font-size:13px;font-weight:500;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-item-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.list-item-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.detail-panel{position:absolute;top:0;right:0;width:440px;height:100%;background:#fff;border-left:1px solid #e5e4e0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;z-index:50;overflow:hidden;}
.detail-panel.open{transform:translateX(0);}
.detail-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid #e5e4e0;flex-shrink:0;}
.detail-close{background:none;border:none;font-size:18px;cursor:pointer;color:#999;padding:0 4px;line-height:1;}
.detail-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.detail-body{flex:1;overflow-y:auto;padding:14px;}
.detail-section{margin-bottom:16px;}
.detail-section-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.detail-field{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f4;}
.detail-field:last-child{border-bottom:none;}
.df-label{font-size:11px;color:#999;width:110px;flex-shrink:0;padding-top:2px;}
.df-val{font-size:13px;color:#1a1a1a;flex:1;}
.df-val select{width:100%;border:none;background:none;font-size:13px;font-family:inherit;color:#1a1a1a;cursor:pointer;outline:none;}
.df-val select:hover{background:#f8f8f7;border-radius:4px;}
.linked-list{display:flex;flex-direction:column;gap:4px;}
.linked-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#f8f8f7;border-radius:6px;font-size:12px;}
.linked-item-name{flex:1;}
.comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.comment{background:#f8f8f7;border-radius:8px;padding:8px 10px;}
.comment-author{font-size:11px;font-weight:600;color:#555;margin-bottom:3px;}
.comment-text{font-size:13px;line-height:1.4;}
.comment-input-wrap{display:flex;gap:6px;}
.comment-input{flex:1;padding:7px 10px;border:1px solid #d5d4d0;border-radius:8px;font-size:13px;font-family:inherit;resize:none;}
.comment-input:focus{outline:2px solid #7F77DD;border-color:transparent;}
.empty{text-align:center;padding:40px 20px;color:#aaa;}
.empty-icon{font-size:28px;margin-bottom:8px;}
.loading-msg{display:flex;align-items:center;justify-content:center;height:160px;color:#aaa;font-size:13px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:12px;padding:20px;width:480px;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;}
.frow{margin-bottom:11px;}
.flabel{font-size:11px;color:#666;margin-bottom:3px;display:block;font-weight:500;}
.finput{width:100%;padding:6px 9px;border:1px solid #d5d4d0;border-radius:6px;font-size:13px;color:#1a1a1a;font-family:inherit;}
.finput:focus{outline:2px solid #7F77DD;border-color:transparent;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.tab-bar{display:flex;gap:0;border-bottom:2px solid #e5e4e0;margin-bottom:14px;}
.tab-btn{padding:8px 16px;font-size:13px;cursor:pointer;background:none;border:none;font-family:inherit;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab-btn.active{color:#7F77DD;border-bottom-color:#7F77DD;font-weight:500;}
.pay-dash{display:flex;flex-direction:column;gap:10px;}
.pay-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px;}
.pay-stat{background:#f8f8f7;border-radius:8px;padding:10px 14px;}
.pay-stat-n{font-size:20px;font-weight:600;color:#1a1a1a;}.pay-stat-l{font-size:11px;color:#888;margin-top:2px;}
.pay-cleaner-row{background:#fff;border:1px solid #e5e4e0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.pay-cleaner-name{flex:1;font-size:13px;font-weight:500;}
.pay-cleaner-amt{font-size:14px;font-weight:600;color:#ef4444;}
.pay-cleaner-cnt{font-size:11px;color:#888;}
.section-group{margin-bottom:18px;}
.section-group-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #f0f0ee;}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
/* Login */
.login-screen{position:fixed;inset:0;background:#fff;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;}
.login-logo{width:52px;height:52px;background:#7F77DD;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;margin-bottom:14px;}
.login-title{font-size:22px;font-weight:600;margin-bottom:5px;}
.login-sub{font-size:14px;color:#888;margin-bottom:28px;text-align:center;}
.login-users{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:520px;}
.login-user-card{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 18px;border:2px solid #e5e4e0;border-radius:12px;cursor:pointer;background:#fff;font-family:inherit;min-width:96px;transition:border-color .15s,background .15s;}
.login-user-card:hover,.login-user-card.selected{border-color:#7F77DD;background:#faf9ff;}
.login-avatar-lg{width:44px;height:44px;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.lav-purple{background:#e0e7ff;color:#3730a3;}.lav-blue{background:#dbeafe;color:#1e40af;}.lav-green{background:#dcfce7;color:#166534;}.lav-orange{background:#ffedd5;color:#9a3412;}.lav-pink{background:#fce7f3;color:#9d174d;}
.login-uname{font-size:13px;font-weight:500;}.login-urole{font-size:10px;color:#aaa;}
.login-pin-wrap{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:240px;}
.login-pin-input{font-size:22px;letter-spacing:8px;text-align:center;width:100%;padding:10px 14px;border:2px solid #d5d4d0;border-radius:10px;font-family:monospace;outline:none;}
.login-pin-input:focus{border-color:#7F77DD;}
.login-pin-error{color:#dc2626;font-size:12px;min-height:16px;}
.login-sign-btn{width:100%;padding:11px;background:#7F77DD;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.login-sign-btn:hover{background:#6b63c9;}
.login-sign-btn:disabled{opacity:.5;cursor:default;}
.login-back{font-size:12px;color:#aaa;cursor:pointer;border:none;background:none;font-family:inherit;text-decoration:underline;}
/* Cleaner view */
.cleaner-view{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#f4f4f3;}
.cleaner-header{display:flex;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid #e5e4e0;gap:10px;}
.cleaner-logo{width:32px;height:32px;background:#7F77DD;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
.cleaner-header-title{font-size:15px;font-weight:600;flex:1;}
.cleaner-user-av{width:30px;height:30px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.cleaner-signout{padding:4px 10px;border:1px solid #d5d4d0;border-radius:6px;background:#fff;font-size:11px;font-family:inherit;cursor:pointer;color:#555;}
.cleaner-content{flex:1;overflow-y:auto;padding:14px;}
.cleaner-section{margin-bottom:20px;}
.cleaner-sec-head{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.cleaner-sec-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.07em;}
.cleaner-sec-badge{background:#7F77DD;color:#fff;font-size:10px;padding:1px 8px;border-radius:99px;font-weight:700;}
.cleaner-sec-badge.urgent{background:#ef4444;}
.job-card{background:#fff;border:1px solid #e5e4e0;border-radius:11px;padding:14px;margin-bottom:9px;}
.job-card.done-card{opacity:.55;}
.job-card-prop{font-size:11px;color:#7F77DD;font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.job-card-title{font-size:16px;font-weight:500;line-height:1.35;margin-bottom:8px;}
.job-card-meta{display:flex;align-items:center;gap:7px;margin-bottom:11px;flex-wrap:wrap;}
.job-card-actions{display:flex;gap:7px;}
.job-done-btn{flex:1;padding:10px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:#22c55e;color:#fff;}
.job-done-btn.undo-btn{background:#f1f5f9;color:#555;}
.job-note-btn{padding:10px 12px;border:1px solid #d5d4d0;border-radius:9px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;color:#555;}
.job-note-area{margin-top:8px;display:flex;gap:7px;}
.job-note-input{flex:1;padding:8px 10px;border:1px solid #d5d4d0;border-radius:8px;font-size:13px;font-family:inherit;resize:none;height:64px;}
.job-note-save{padding:0 12px;border:none;border-radius:8px;background:#7F77DD;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
/* ── Language toggle ────────────────────────────────── */
.lang-toggle{padding:4px 10px;border:1px solid #d5d4d0;border-radius:6px;background:#fff;color:#555;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.lang-toggle:hover{background:#f8f8f7;}
.login-lang{position:absolute;top:14px;right:14px;}
/* ── Mobile nav: hidden by default ─────────────────────── */
/* ── Bottom nav ─────────────────────────────────────────── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e4e0;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px 5px;font-size:14px;color:#aaa;cursor:pointer;border:none;background:none;font-family:inherit;gap:3px;transition:color .15s;}
.mobile-nav-btn .mnav-pill{display:flex;align-items:center;justify-content:center;width:54px;height:32px;border-radius:16px;font-size:22px;transition:background .15s;}
.mobile-nav-btn.active .mnav-pill{background:#7F77DD;}
.mobile-nav-btn.active{color:#7F77DD;font-weight:700;}
/* ── Language picker popup ──────────────────────────────── */
.lang-globe{width:38px;height:38px;border-radius:50%;border:1px solid #e5e4e0;background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:0;transition:box-shadow .15s;}
.lang-globe:hover{box-shadow:0 2px 8px rgba(0,0,0,.15);}
#lang-picker-popup{display:none;position:fixed;background:#fff;border:1px solid #e5e4e0;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:900;overflow:hidden;min-width:180px;}
.lang-opt{display:flex;align-items:center;gap:12px;padding:14px 18px;font-size:16px;width:100%;border:none;background:none;cursor:pointer;font-family:inherit;text-align:left;color:#1a1a1a;}
.lang-opt:hover{background:#f8f8f7;}
.lang-opt.active-lang{background:#eeecff;color:#7F77DD;font-weight:600;}
.lang-opt .lang-check{margin-left:auto;color:#7F77DD;font-size:14px;}
/* ── Mobile-only / desktop-only helpers ─────────────────── */
.mobile-only{display:none!important;}
@media(max-width:700px){
  .mobile-only{display:inline-flex!important;}
  .desktop-only{display:none!important;}
  /* layout */
  body{overflow:auto!important;font-size:18px!important;}
  .app{flex-direction:column!important;height:auto!important;min-height:100vh!important;}
  .sidebar{display:none!important;}
  .main{height:auto!important;padding-bottom:80px!important;}
  /* topbar 2-row mobile layout */
  .topbar-r1{padding:10px 14px!important;}
  .topbar-title{font-size:18px!important;font-weight:700!important;}
  .topbar-right{display:none!important;}
  .topbar-mobile-right{display:flex!important;}
  /* row2 styling (display toggled by JS) */
  .topbar-r2{align-items:center;padding:6px 14px 8px;gap:8px;border-top:1px solid #f0eeea;}
  /* buttons */

<script>
/* ── Notion API client ──────────────────────────────────── */
async function notion(params) {
  const res = await fetch('/.netlify/functions/notion', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(params),
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function queryDB(dbId) {
  const res = await notion({action:'queryDB', dbId});
  return res.results || [];
}
async function createPage(dbId, properties) {
  return notion({action:'createPage', dbId, properties});
}
async function updatePage(id, properties) {
  return notion({action:'updatePage', id, properties});
}
async function getComments(pageId) {
  return notion({action:'getComments', pageId});
}
async function addComment(pageId, text) {
  return notion({action:'createComment', pageId, text});
}

/* ── Notion property helpers ────────────────────────────── */
function rp(props, name) {
  const p = props?.[name]; if (!p) return null;
  switch(p.type) {
    case 'title':        return p.title?.map(t=>t.plain_text).join('') || '';
    case 'rich_text':    return p.rich_text?.map(t=>t.plain_text).join('') || '';
    case 'select':       return p.select?.name || '';
    case 'multi_select': return p.multi_select?.map(s=>s.name).join(', ') || '';
    case 'number':       return p.number;
    case 'date':         return p.date?.start || '';
    case 'checkbox':     return p.checkbox;
    case 'email':        return p.email || '';
    case 'phone_number': return p.phone_number || '';
    case 'url':          return p.url || '';
    default:             return null;
  }
}
// Build Notion property for API write
function wp(type, value) {
  if (value === null || value === undefined || value === '') return null;
  switch(type) {
    case 'title':    return {title:[{text:{content:String(value)}}]};
    case 'text':     return {rich_text:[{text:{content:String(value)}}]};
    case 'select':   return {select:{name:String(value)}};
    case 'number':   return {number:typeof value==='number'?value:parseFloat(value)||null};
    case 'date':     return {date:{start:String(value)}};
    case 'checkbox': return {checkbox:Boolean(value)};
    default:         return {rich_text:[{text:{content:String(value)}}]};
  }
}
function safeJSON(v){try{return v&&v!=='null'?JSON.parse(v):null;}catch{return null;}}
const h=v=>String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const aa=v=>String(v||'').replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'");

const DBID_USERS      ='9c2b12a9-dd63-4d67-85b8-ba7d56ef8b2a';

// Shared user loader — called at login screen AND on app boot (so saved-session users get full list)
async function loadLoginUsers(){
  try{
    const [userPages,cleanerPages]=await Promise.all([queryDB(DBID_USERS),queryDB(DBID_CLEANERS)]);
    const adminUsers=userPages.map(p=>{
      const pr=p.properties;
      return{id:p.id,name:rp(pr,'Name')||'',role:rp(pr,'Role')||'Admin',pin:String(rp(pr,'PIN')||'').trim(),color:rp(pr,'Color')||'purple',initials:rp(pr,'Initials')||''};
    }).filter(u=>u.name);
    const cleanerUsers=cleanerPages.map(p=>{
      const pr=p.properties;
      const name=rp(pr,'Name')||'';
      const initials=name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
      return{id:p.id,name,role:'Cleaner',pin:String(rp(pr,'PIN')||'').trim(),color:'green',initials};
    }).filter(u=>u.name&&u.pin);
    const adminNames=new Set(adminUsers.map(u=>u.name.toLowerCase()));
    const merged=[...adminUsers,...cleanerUsers.filter(u=>!adminNames.has(u.name.toLowerCase()))];
    if(merged.length)loginUsers=merged;
  }catch(e){
    // On login screen only, fall back to hardcoded users so login still works
    if(!loginUsers.length)loginUsers=[
      {id:'dovi',  name:'Dovi',   role:'Admin', pin:'1234', color:'purple',initials:'DW'},
      {id:'hindy', name:'Hindy',  role:'Admin', pin:'2345', color:'blue',  initials:'HI'},
      {id:'yechiel',name:'Yechiel',role:'Supervisor',pin:'3456',color:'green',initials:'YE'},
    ];
  }
}
async function showLoginScreen(){
  document.getElementById('login-screen').style.display='flex';
  const uEl=document.getElementById('ls-username');if(uEl)uEl.value='';
  const pEl=document.getElementById('ls-pin-input');if(pEl)pEl.value='';
  const eEl=document.getElementById('ls-pin-error');if(eEl)eEl.textContent='';
  await loadLoginUsers();
  setTimeout(()=>document.getElementById('ls-username')?.focus(),80);
}
function doLogin(){
  const usernameRaw=(document.getElementById('ls-username')?.value||'').trim();
  const pin=(document.getElementById('ls-pin-input')?.value||'').trim();
  const errEl=document.getElementById('ls-pin-error');
  errEl.textContent='';
  if(!usernameRaw){errEl.textContent=t('Please enter your username');return;}
  if(!pin){errEl.textContent=t('Please enter your PIN');return;}
  const lower=usernameRaw.toLowerCase();
  const user=loginUsers.find(u=>u.name.toLowerCase()===lower)||loginUsers.find(u=>u.name.toLowerCase().startsWith(lower));
  if(!user){errEl.textContent=t('Username not found');return;}
  if(!user.pin){errEl.textContent=t('No PIN set for your account — ask an admin to add one in Notion');return;}
  if(pin!==user.pin){errEl.textContent=t('Incorrect PIN — try again');document.getElementById('ls-pin-input').value='';document.getElementById('ls-pin-input').focus();return;}
  document.getElementById('login-screen').style.display='none';
  saveSession(user);
  bootApp();
}

/* ── Display helpers ────────────────────────────────────── */
function statusTag(s){const map={'Open':'tag-blue','In Progress':'tag-yellow','Blocked':'tag-red','Done':'tag-green','Draft':'tag-gray','Active':'tag-blue','Complete':'tag-green','Accepted':'tag-purple','On Hold':'tag-orange','Cancelled':'tag-red','Scheduled':'tag-blue'};return`<span class="tag ${map[s]||'tag-gray'}">${h(t(s))}</span>`;}
function priorityTag(p){if(!p)return'';const map={High:'tag-red',Medium:'tag-yellow',Low:'tag-gray'};return`<span class="tag ${map[p]||'tag-gray'}">${h(t(p))}</span>`;}
function fmtRelDate(d){
  if(!d)return'';
  try{
    const dt=new Date(d.length===10?d+'T00:00:00':d);
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.round((dt-today)/86400000);
    if(diff===0)return'Today';
    if(diff===1)return'Tomorrow';
    if(diff===-1)return'Yesterday';
    const curY=today.getFullYear(),dtY=dt.getFullYear();
    const opts={month:'short',day:'numeric'};
    if(dtY!==curY)opts.year='numeric';
    return dt.toLocaleDateString('en-US',opts);
  }catch{return d;}
}
// Relative time for timestamps (comments, notifications)
function fmtRelTime(isoStr){
  if(!isoStr)return'';
  try{
    const dt=new Date(isoStr);
    const now=new Date();
    const diffMs=now-dt;
    const diffMin=Math.floor(diffMs/60000);
    const diffHrs=Math.floor(diffMs/3600000);
    if(diffMin<1)return'just now';
    if(diffMin<60)return diffMin===1?'1 min ago':`${diffMin} mins ago`;
    if(diffHrs<24)return diffHrs===1?'1 hr ago':`${diffHrs} hrs ago`;
    const today=new Date();today.setHours(0,0,0,0);
    const yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
    const dtDay=new Date(dt);dtDay.setHours(0,0,0,0);
    const timeStr=dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    if(dtDay.getTime()===today.getTime())return`Today ${timeStr}`;
    if(dtDay.getTime()===yesterday.getTime())return`Yesterday ${timeStr}`;
    const curY=today.getFullYear(),dtY=dt.getFullYear();
    const dateStr=dt.toLocaleDateString('en-US',{month:'short',day:'numeric',...(dtY!==curY?{year:'numeric'}:{})});
    return`${dateStr} ${timeStr}`;
  }catch{return'';}
}
function dueTag(d){
  if(!d)return'';
  try{
    const dt=new Date(d+'T00:00:00');
    const today=new Date();today.setHours(0,0,0,0);
    const ov=dt<today;
    return`<span class="due${ov?' overdue':''}">${fmtRelDate(d)}</span>`;
  }catch{return`<span class="due">${h(d)}</span>`;}
}
const colorToAvCls={purple:'av-a',blue:'av-b',green:'av-c',orange:'av-d',pink:'av-e'};
function avFor(name){
  if(!name)return'';
  const m=loginUsers.find(u=>name.toLowerCase().includes(u.name.toLowerCase()))||TEAM.find(t=>name.toLowerCase().includes(t.name.toLowerCase()));
  if(!m)return'';
  const cls=m.avCls||(colorToAvCls[m.color]||'av-a');
  const ini=m.initials||(m.name||'').substring(0,2).toUpperCase();
  return`<span class="avatar ${cls}" title="${h(m.name)}">${h(ini)}</span>`;
}
function fmtMoney(n){return n!=null&&n!==''?'$'+Number(n).toLocaleString():'—';}

function formatChecklistResponses(raw){
  // Parse the structured section text into coloured HTML
  if(!raw)return'';
  const sections=raw.split(/\n\n+/);
  return sections.map(sec=>{
    const lines=sec.split('\n');
    const title=lines[0]||'';
    const items=lines.slice(1).map(line=>{
      const isYes=line.startsWith('  ✓');
      const isNo=line.startsWith('  ✗');
      const color=isYes?'#166534':isNo?'#991b1b':'#555';
      const bg=isYes?'#dcfce7':isNo?'#fee2e2':'#f1f5f9';
      return`<div style="display:flex;align-items:flex-start;gap:6px;padding:3px 0;">

function renderPaymentDashboard(){
  const unpaid=st.cleaningJobs.filter(j=>!j.paid&&j.status!=='Cancelled');

  const propNames=[...new Set([...st.tasks.map(t=>t.property),...st.cleaningJobs.map(j=>j.property)].filter(Boolean))];
  const propFilter=propNames.length?`<div style="margin-bottom:12px;"><select class="sel" onchange="st.myDashProp=this.value;renderSection()"><option value="all">${t('All properties')}</option>${propNames.map(p=>`<option${st.myDashProp===p?' selected':''}>${h(p)}</option>`).join('')}</select></div>`:'';

  let content='';
  if(st.myDashTab==='assigned'){

    let myT=isAdmin
      ?st.tasks.filter(t=>t.status!=='Done')

      ?st.cleaningJobs.filter(j=>j.status!=='Complete'&&j.status!=='Cancelled')
      :st.cleaningJobs.filter(j=>j.cleaner&&j.cleaner.toLowerCase().includes(me.toLowerCase())&&j.status!=='Complete'&&j.status!=='Cancelled');

      (myC.length?`<div class="section-group"><div class="section-group-title">${t('Cleaning Jobs')} (${myC.length})</div><div class="list-view">${myC.map(j=>`<div class="list-item" onclick="openDetail('cleaning','${aa(j.id)}')"><div class="list-item-main"><div class="list-item-title">${h(j.name)}</div><div class="list-item-meta">${statusTag(j.status)}${j.property?`<span class="tag tag-prop">${h(j.property)}</span>`:''}${j.cleaner?`<span class="tag tag-gray">🧹 ${h(j.cleaner)}</span>`:''}</div></div><div class="list-item-right">${dueTag(j.deadline)}</div></div>`).join('')}</div></div>`:'')||`<div class="empty"><div class="empty-icon">✅</div><div>${isAdmin?t('No open tasks or jobs'):t('Nothing assigned to you right now')}</div></div>`;
  }else{
    let myW=isAdmin
      ?st.workOrders.filter(w=>w.status!=='Complete'&&w.status!=='Cancelled')
      :st.workOrders.filter(w=>w.supervisor&&w.supervisor.toLowerCase().includes(me.toLowerCase())&&w.status!=='Complete'&&w.status!=='Cancelled');

    myW=sortByDeadline(myW,'estCompletion');
    content=myW.length?`<div class="list-view">${myW.map(w=>`<div class="list-item" onclick="openDetail('wo','${aa(w.id)}')"><div class="list-item-main"><div class="list-item-title">${h(w.name)}</div><div class="list-item-meta">${statusTag(w.status)}${w.property?`<span class="tag tag-prop">${h(w.property)}</span>`:''}${w.supervisor?`<span class="tag tag-gray">${h(w.supervisor)}</span>`:''}</div></div><div class="list-item-right">${dueTag(w.estCompletion)}</div></div>`).join('')}</div>`:`<div class="empty"><div class="empty-icon">👀</div><div>${t('No active work orders')}</div></div>`;
  }
  return propFilter+tabs+content;
}

async function updateField(type,id,field,propType,value){
  try{
    const props={};
    if(propType==='select')props[field]=wp('select',value);
    else if(propType==='checkbox')props[field]=wp('checkbox',value);
    else props[field]=wp('text',value);
    await updatePage(id,props);
    const item=type==='task'?st.tasks.find(t=>t.id===id):type==='wo'?st.workOrders.find(w=>w.id===id):st.cleaningJobs.find(j=>j.id===id);
    if(item){
      if(field==='Status')item.status=value;
      else if(field==='Priority')item.priority=value;
      else if(field==='Paid?')item.paid=value;
      else if(field==='Property')item.property=value;
      else if(field==='Assignee')item.assignee=value;
      else if(field==='Deadline')item.deadline=value;
    }
    toast('Updated ✓');renderSection();
  }catch(e){toast('Error: '+(e.message||e));}
}

let deletedCommentIds=JSON.parse(localStorage.getItem('deleted_comments')||'[]');
let editingCommentId=null;

function markCommentDeleted(commentId,pageId){
  if(!deletedCommentIds.includes(commentId))deletedCommentIds.push(commentId);
  localStorage.setItem('deleted_comments',JSON.stringify(deletedCommentIds));
  loadComments(pageId);
}

function startEditComment(commentId,pageId,currentBody){
  editingCommentId=commentId;
  // Re-render so textarea appears for that comment
  const el=document.getElementById('dp-comments');
  if(!el)return;
  // Find the comment div and replace with an edit form
  const cards=el.querySelectorAll('.comment');
  cards.forEach(card=>{
    if(card.dataset.cid===commentId){
      card.innerHTML=`<textarea id="edit-comment-ta" style="width:100%;padding:6px;border:1px solid #7F77DD;border-radius:6px;font-size:13px;font-family:inherit;resize:none;" rows="3">${currentBody.replace(/</g,'&lt;')}</textarea><div style="display:flex;gap:6px;margin-top:5px;"><button class="btn btn-primary btn-sm" onclick="submitEditComment('${aa(commentId)}','${aa(pageId)}')">Save</button><button class="btn btn-sm" onclick="editingCommentId=null;loadComments('${aa(pageId)}')">Cancel</button></div>`;
      card.querySelector('#edit-comment-ta').focus();
    }
  });
}

async function submitEditComment(commentId,pageId){
  const ta=document.getElementById('edit-comment-ta');
  const newBody=(ta?.value||'').trim();if(!newBody)return;
  const name=currentSession?.name||'Team';
  const prefixed=`[${name}]: ${newBody}`;
  try{
    // Mark old comment deleted and create new one with edited text
    markCommentDeleted(commentId,pageId);
    await addComment(pageId,prefixed);
    editingCommentId=null;
    toast('Comment updated ✓');
    loadComments(pageId);
  }catch(e){toast('Error: '+(e.message||e));}
}

async function loadComments(pageId){
  const el=document.getElementById('dp-comments');if(!el)return;
  try{
    const res=await getComments(pageId);
    const comments=(res.results||[]).filter(c=>!deletedCommentIds.includes(c.id));
    if(!comments.length){el.innerHTML='<div style="color:#aaa;font-size:12px;">No comments yet</div>';return;}
    el.innerHTML=comments.map(c=>{
      const rawText=(c.rich_text||[]).map(rt=>rt.plain_text||rt.text?.content||'').join('');
      // Support both "[Name]: text" (new) and "[Name · date]: text" (legacy) formats
      const match=rawText.match(/^\[([^\]]+?)\]:\s([\s\S]*)$/);
      const author=match?match[1].split(' · ')[0]:( c.created_by?.name||'Team');
      const body=match?match[2]:rawText;
      // Always use Notion's created_time for accurate relative display
      const timeStr=c.created_time?fmtRelTime(c.created_time):'';
      const isMe=author===currentSession?.name;
      const actions=isMe?`<span style="display:flex;gap:4px;opacity:0.6;"><button onclick="startEditComment('${aa(c.id)}','${aa(pageId)}','${aa(body)}')" style="background:none;border:none;cursor:pointer;font-size:11px;color:#7F77DD;padding:0 2px;" title="Edit">✏️</button><button onclick="markCommentDeleted('${aa(c.id)}','${aa(pageId)}')" style="background:none;border:none;cursor:pointer;font-size:11px;color:#ef4444;padding:0 2px;" title="Delete">🗑</button></span>`:'';
      return`<div class="comment" data-cid="${h(c.id)}"><div class="comment-author" style="display:flex;align-items:center;justify-content:space-between;"><span style="font-weight:600;">${h(author)}<span style="font-weight:400;color:#aaa;font-size:10px;"> · ${h(timeStr)}</span></span>${actions}</div><div class="comment-text">${h(body)}</div></div>`;
    }).join('');
  }catch(e){if(el)el.innerHTML='<div style="color:#aaa;font-size:12px;">Comments unavailable</div>';}
}

/* ── Guesty ─────────────────────────────────────────────── */
let gToken=null,gTokenExp=0;
const G_API='https://open-api.guesty.com/v1';
function _loadCachedGToken(){
  try{const t=localStorage.getItem('g_tok'),e=parseInt(localStorage.getItem('g_tok_exp')||'0');if(t&&Date.now()<e){gToken=t;gTokenExp=e;}}catch(e){}
}
async function guestyToken(){
  if(!gToken)_loadCachedGToken();
  if(gToken&&Date.now()<gTokenExp)return gToken;
  const res=await fetch('/.netlify/functions/guesty-token');
  const d=await res.json();if(d.error)throw new Error(d.error);
  gToken=d.access_token;gTokenExp=Date.now()+(d.expires_in-60)*1000;
  try{localStorage.setItem('g_tok',gToken);localStorage.setItem('g_tok_exp',gTokenExp.toString());}catch(e){}
  return gToken;
}
async function gGet(path){const tok=await guestyToken();const r=await fetch(G_API+path,{headers:{Authorization:`Bearer ${tok}`}});if(!r.ok)throw new Error(`${path} → ${r.status}`);return r.json();}
const isoD=d=>d.toISOString().split('T')[0];
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};

// Format Guesty listing address as "City StreetNum/Apt" (e.g. "Be'er Sheva 4/5")
function guestyAddress(r){
  const addr=r.listing?.address||r.listing?.complexAddress||{};
  const city=addr.city||addr.neighborhood||'';
  const street=addr.street||'';
  // extract number from street (e.g. "Herzl 12" → "12")
  const numMatch=street.match(/\d+/);const streetNum=numMatch?numMatch[0]:'';
  const apt=addr.apt||addr.unit||addr.unitNumber||'';
  if(city&&streetNum)return apt?`${city} ${streetNum}/${apt}`:`${city} ${streetNum}`;
  if(city&&street)return apt?`${city}, ${street}/${apt}`:`${city}, ${street}`;
  return r.listing?.nickname||r.listing?.title||'Property';
}

async function loadGuestyCalendar(){

  el.innerHTML=`<div class="guesty-panel-stats"><div class="guesty-dot loading" id="guesty-dot"></div><span id="guesty-status-text">Connecting to Guesty…</span></div><div id="guesty-cal"></div>`;
  const dot=document.getElementById('guesty-dot'),stxt=document.getElementById('guesty-status-text'),gcal=document.getElementById('guesty-cal');
  try{
    const today=new Date();today.setHours(0,0,0,0);
    const todayStr=isoD(today),endStr=isoD(addDays(today,14));
    const [ciR,coR]=await Promise.all([
      gGet(`/reservations?checkInDateFrom=${todayStr}&checkInDateTo=${endStr}&status=confirmed&limit=200`),
      gGet(`/reservations?checkOutDateFrom=${todayStr}&checkOutDateTo=${endStr}&status=confirmed&limit=200`)
    ]);
    cachedGuestyData={ci:ciR.results||ciR.data||[],co:coR.results||coR.data||[],todayStr,today};
    dot.className='guesty-dot';stxt.textContent=`Guesty — live · ${cachedGuestyData.ci.length+cachedGuestyData.co.length} movements next 14 days`;
    renderGuestyCalendar(gcal);
  }catch(e){if(dot)dot.className='guesty-dot error';if(stxt)stxt.textContent='Guesty unavailable';if(gcal)gcal.innerHTML=`<div class="guesty-error" style="color:#999;font-size:11px;padding:4px 0;">${h(e.message)}</div>`;}
}
function renderGuestyCalendar(gcal){
  if(!gcal||!cachedGuestyData)return;
  const {ci,co,todayStr,today}=cachedGuestyData;
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const days=[];for(let i=0;i<14;i++)days.push(addDays(today,i));
  gcal.innerHTML='<div class="cal-strip" style="padding:6px 0 10px;">'+days.map(day=>{
    const ds=isoD(day),isToday=ds===todayStr,isExp=!!expandedCalDays[ds];
    const ins=ci.filter(r=>(r.checkIn||'').startsWith(ds));
    const outs=co.filter(r=>(r.checkOut||'').startsWith(ds));
    const total=ins.length+outs.length;
    const evHtml=[
      ...ins.map(r=>`<div class="cal-ev ev-in" style="white-space:normal;">↓ ${h(guestyAddress(r))}</div>`),
      ...outs.map(r=>`<div class="cal-ev ev-out" style="white-space:normal;">↑ ${h(guestyAddress(r))}</div>`)
    ];
    const preview=evHtml.slice(0,isExp?999:2).join('');
    const moreBtn=total>2&&!isExp?`<div onclick="expandCalDay('${ds}')" style="font-size:9px;color:#7F77DD;cursor:pointer;margin-top:2px;">+${total-2} more…</div>`:
      total>2&&isExp?`<div onclick="expandCalDay('${ds}')" style="font-size:9px;color:#aaa;cursor:pointer;margin-top:2px;">Show less</div>`:'';
    return`<div class="cal-day${isToday?' today':''}" style="min-width:90px;cursor:default;">
      <div class="cal-dn">${dayNames[day.getDay()]}</div>
      <div class="cal-dd">${day.getDate()}</div>
      ${preview||'<div style="font-size:9px;color:#ddd;padding-top:2px;">—</div>'}
      ${moreBtn}
    </div>`;
  }).join('')+'</div>';
}
function expandCalDay(ds){
  expandedCalDays[ds]=!expandedCalDays[ds];
  renderGuestyCalendar(document.getElementById('guesty-cal'));
}

function onReservationSelect(sel){

  if(isNaN(idx)||!cachedResvs[idx]){if(detail)detail.textContent='';return;}
  const r=cachedResvs[idx];
  const addr=guestyAddress(r);
  const guest=(r.guest||r.guestInfo||{});const gName=`${guest.firstName||''} ${guest.lastName||''}`.trim()||'Guest';
  const co=(r.checkOut||'').split('T')[0];const ci=(r.checkIn||'').split('T')[0];
  const listingName=r.listing?.nickname||r.listing?.title||'';
  const fName=document.getElementById('f-name');const fProp=document.getElementById('f-prop');
  const fDeadline=document.getElementById('f-deadline');const fType=document.getElementById('f-type');
  if(fName&&!fName.value)fName.value=`Turnover – ${addr}`;
  if(fDeadline)fDeadline.value=co;if(fType)fType.value='Regular Turnover';
  // Auto-suggest property: try matching by listing name, city, or address tokens
  if(fProp&&st.properties.length){
    const addrLower=addr.toLowerCase();const nameLower=listingName.toLowerCase();
    const city=(r.listing?.address?.city||'').toLowerCase();
    let match=st.properties.find(p=>{
      const pn=p.name.toLowerCase();
      return pn===nameLower||pn.includes(nameLower.split(' ')[0])||
        (city&&pn.includes(city))||addrLower.includes(pn.split(' ')[0]);
    });
    if(match)fProp.value=match.name;
  }
  if(detail)detail.innerHTML=`<span style="color:#7F77DD;font-weight:500;">${h(addr)}</span> · ${h(gName)} · ${ci?new Date(ci+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):''} → ${co?new Date(co+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):''} <span style="color:#aaa;font-size:10px;">ID: ${h(r.id)}</span>`;

}

async function loadNotifications(){
  const user=currentSession?.name||'';
  notifState.loading=true;renderSection();
  const items=[];
  try{
    // Tasks assigned to me — record first-seen time so "received" is stable
    const myTasks=st.tasks.filter(t=>t.assignee&&t.assignee.toLowerCase().includes(user.toLowerCase()));
    let tsChanged=false;
    myTasks.forEach(t=>{
      const key=`task-${t.id}`;
      if(!notifTimestamps[key]){notifTimestamps[key]=Date.now();tsChanged=true;}
      const ts=notifTimestamps[key];
      items.push({
        id:key,type:'task',itemId:t.id,icon:'📋',
        title:`Task assigned to you: ${t.name}`,
        detail:`${t.property?t.property+' · ':''}${t.status}${t.deadline?' · Due '+fmtRelDate(t.deadline):''}`,
        ts,timeStr:fmtRelTime(new Date(ts).toISOString()),
      });
    });
    if(tsChanged)localStorage.setItem('notif_ts',JSON.stringify(notifTimestamps));
    // Fetch comments on tasks/WOs involving current user (limit API calls)
    const myItems=[
      ...st.tasks.filter(t=>t.assignee&&t.assignee.toLowerCase().includes(user.toLowerCase())),
      ...st.workOrders.filter(w=>w.supervisor&&w.supervisor.toLowerCase().includes(user.toLowerCase())),
    ].slice(0,10);
    await Promise.all(myItems.map(async item=>{
      try{
        const res=await getComments(item.id);
        (res.results||[]).filter(c=>!deletedCommentIds.includes(c.id)).forEach(c=>{
          const rawText=(c.rich_text||[]).map(rt=>rt.plain_text||rt.text?.content||'').join('');
          const match=rawText.match(/^\[([^\]]+?)\]:\s([\s\S]*)$/);
          const author=match?match[1].split(' · ')[0]:(c.created_by?.name||'Team');
          const body=match?match[2]:rawText;
          const ts=c.created_time?new Date(c.created_time).getTime():0;
          if(author!==user){
            items.push({
              id:`comment-${c.id}`,
              type:item.status!==undefined?'task':'wo',
              itemId:item.id,icon:'💬',
              title:`${author} commented on "${item.name}"`,
              detail:body.substring(0,80)+(body.length>80?'…':''),
              ts,timeStr:c.created_time?fmtRelTime(c.created_time):'',
            });
          }
        });
      }catch{}
    }));
    // Operations Manager: receive activity for ALL cleaning jobs
    if(currentSession?.role==='Operations Manager'){
      let opsChanged=false;
      st.cleaningJobs.forEach(j=>{
        if(j.status==='Accepted'){
          const key=`accept-${j.id}`;
          if(!notifTimestamps[key]){notifTimestamps[key]=Date.now();opsChanged=true;}
          items.push({id:key,type:'cleaning',itemId:j.id,icon:'✅',
            title:`Job accepted: ${j.name}`,
            detail:`${j.cleaner?j.cleaner+' · ':''}${j.property||''}`,
            ts:notifTimestamps[key],timeStr:fmtRelTime(new Date(notifTimestamps[key]).toISOString())});
        }
        if(j.status==='Complete'){
          const key=`complete-${j.id}`;
          if(!notifTimestamps[key]){notifTimestamps[key]=Date.now();opsChanged=true;}
          items.push({id:key,type:'cleaning',itemId:j.id,icon:'🏁',
            title:`Job completed: ${j.name}`,
            detail:`${j.cleaner?j.cleaner+' · ':''}${j.property||''}`,
            ts:notifTimestamps[key],timeStr:fmtRelTime(new Date(notifTimestamps[key]).toISOString())});
        }
      });
      if(opsChanged)localStorage.setItem('notif_ts',JSON.stringify(notifTimestamps));
    }
    items.sort((a,b)=>b.ts-a.ts);
  }catch(e){console.error('notifications',e);}
  notifState.items=items;
  notifState.loading=false;
  // Update unread badge
  updateNotifBadge();
  // Mark all as seen after a short delay (so NEW labels show briefly)

    notifState.lastSeen=Date.now();
    localStorage.setItem('notif_last_seen',notifState.lastSeen.toString());
    renderSection();
  },3000);
  renderSection();
}

        ${isDone?`<button class="job-done-btn undo-btn" onclick="cleanerUndoDone('${aa(j.id)}')">${t('Undo')}</button>`:''}
        ${(isSched||isAccepted)?`<button class="job-note-btn" onclick="cleanerToggleNote('${aa(j.id)}')">📝</button>`:''}
      </div>
      ${noteOpen&&!isDone?`<div class="job-note-area"><textarea class="job-note-input" id="note-${aa(j.id)}" placeholder="Add a note…"></textarea><button class="job-note-save" onclick="cleanerSaveNote('${aa(j.id)}')">Save</button></div>`:''}
    </div>`;
  }
  function sec(title,items,urgent){
    if(!items.length)return'';
    const badge=`<span class="cleaner-sec-badge${urgent?' urgent':''}">${items.length}</span>`;
    return`<div class="cleaner-section"><div class="cleaner-sec-head"><span class="cleaner-sec-title">${title}</span>${badge}</div>${items.map(jCard).join('')}</div>`;
  }
  const html=(todayJ.length?sec(t("Today's jobs"),todayJ,true):'<div class="cleaner-section"><div class="cleaner-sec-head"><span class="cleaner-sec-title">'+t("Today's jobs")+'</span></div><div style="text-align:center;padding:16px;color:#aaa;font-size:13px;">'+t('All clear for today 🎉')+'</div></div>')+
    sec(t('Next 7 days'),upcoming,false)+sec(t('No date'),noDate,false)+
    (done.length?sec(t('✓ Done'),done,false):'')+
    (cancelled.length?sec(t('Cancelled'),cancelled,false):'');
  el.innerHTML=html||`<div class="empty"><div class="empty-icon">🧹</div><div>${t('No cleaning jobs found.')}</div></div>`;
}

function showChecklistModal(jobId,jobName,propertyName){
  checklistJobId=jobId;checklistSection=0;checklistAnswers={jobName,propertyName};
  renderChecklistSection();
}
function renderChecklistSection(){
  let overlay=document.getElementById('checklist-overlay');
  if(!overlay){overlay=document.createElement('div');overlay.id='checklist-overlay';overlay.className='checklist-overlay';document.body.appendChild(overlay);}
  const sec=CHECKLIST_SECTIONS[checklistSection];
  const totalSec=CHECKLIST_SECTIONS.length;
  const isLast=checklistSection===totalSec-1;
  const pct=Math.round((checklistSection/totalSec)*100);
  // count how many items unanswered
  const unanswered=sec.items.filter((_,ii)=>!checklistAnswers[`${checklistSection}_${ii}`]).length;
  const itemsHtml=sec.items.map((item,ii)=>{
    const key=`${checklistSection}_${ii}`;
    const noteKey=`${key}_note`;
    const ans=checklistAnswers[key]||'';
    const noteVal=checklistAnswers[noteKey]||'';
    const showNote=item.noteKey||ans==='no';
    return`<div class="checklist-item">
      <div class="checklist-item-left">
        <div class="checklist-item-q">${h(item.q)}</div>
        ${item.hint?`<div class="checklist-item-hint">${h(item.hint)}</div>`:''}
        ${showNote?`<div class="checklist-item-note"><textarea placeholder="${item.noteKey?'Specify…':'Describe the issue…'}" oninput="checklistAnswers['${noteKey}']=this.value">${h(noteVal)}</textarea></div>`:''}
      </div>
      <div class="checklist-yn">
        <button class="cl-yn yes${ans==='yes'?' active':''}" onclick="clSetAns(${checklistSection},${ii},'yes')">✓</button>
        <button class="cl-yn no${ans==='no'?' active':''}" onclick="clSetAns(${checklistSection},${ii},'no')">✗</button>
      </div>
    </div>`;
  }).join('');
  overlay.innerHTML=`<div class="checklist-modal">
    <div class="checklist-progress-bar"><div class="checklist-progress-fill" style="width:${pct}%;"></div></div>
    <div class="checklist-head">
      <div class="checklist-sec-label">Section ${checklistSection+1} of ${totalSec}</div>
      <div class="checklist-sec-title">${sec.icon} ${sec.title}</div>
      <div class="checklist-sec-count">${sec.items.length} items</div>
    </div>
    <div class="checklist-body">${itemsHtml}</div>
    <div class="checklist-foot">
      <button class="btn" onclick="${checklistSection>0?'clPrev()':'cancelChecklist()'}">${checklistSection>0?'← Back':'Cancel'}</button>
      ${unanswered>0
        ?`<span class="checklist-warn">${unanswered} item${unanswered>1?'s':''} unanswered</span><button class="btn btn-primary" disabled style="opacity:.45;">${isLast?'Submit & Complete ✓':'Next Section →'}</button>`
        :`<button class="btn btn-primary" onclick="${isLast?'checklistSubmit()':'clNext()'}"> ${isLast?'Submit & Complete ✓':'Next Section →'}</button>`
      }
    </div>
  </div>`;
}
function clSetAns(si,ii,val){
  checklistAnswers[`${si}_${ii}`]=val;
  renderChecklistSection();
}
function clNext(){checklistSection++;renderChecklistSection();}
function clPrev(){checklistSection--;renderChecklistSection();}
function cancelChecklist(){document.getElementById('checklist-overlay')?.remove();}
async function checklistSubmit(){
  // Build responses text grouped by section
  const lines=CHECKLIST_SECTIONS.map(sec=>{
    const si=CHECKLIST_SECTIONS.indexOf(sec);
    const itemLines=sec.items.map((item,ii)=>{
      const ans=checklistAnswers[`${si}_${ii}`]||'—';
      const note=checklistAnswers[`${si}_${ii}_note`]||'';
      const mark=ans==='yes'?'✓':ans==='no'?'✗':'—';
      return`  ${mark} ${item.q}${note?` [${note}]`:''}`;
    }).join('\n');
    return`${sec.icon} ${sec.title}\n${itemLines}`;
  }).join('\n\n');
  const responses=lines;
  cancelChecklist();
  try{
    // 1) Mark job Complete
    await updatePage(checklistJobId,{Status:wp('select','Complete')});
    // 2) Record for Ops Manager
    const key=`complete-${checklistJobId}`;notifTimestamps[key]=Date.now();
    localStorage.setItem('notif_ts',JSON.stringify(notifTimestamps));
    // 3) Auto-update property status to "Needs Inspection"
    const job=_cleanerJobs.find(j=>j.id===checklistJobId);
    if(job?.property){
      const prop=st.properties.find(p=>p.name===job.property);
      if(prop&&prop.propStatus==='Dirty'){
        await updatePage(prop.id,{'Property Status':wp('select','Needs Inspection')});
        prop.propStatus='Needs Inspection';
      }
    }
    // 4) Write checklist answers directly onto the cleaning job page
    await updatePage(checklistJobId,{
      'Submitted At':wp('date',new Date().toISOString().split('T')[0]),
      'Responses':wp('text',responses),
    }).catch(()=>{});
    // 5) Update local state
    if(job)job.status='Complete';
    toast('Job completed ✓');renderCleanerContent();
  }catch(e){toast('Error completing job: '+(e.message||e));}
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

    <div class="frow"><label class="flabel">Confirm new PIN</label><input class="finput" type="password" inputmode="numeric" id="f-new-pin2" maxlength="8" placeholder="Repeat new PIN"></div>
    <div id="f-pin-err" style="color:#dc2626;font-size:12px;min-height:16px;margin-bottom:6px;"></div>
    <div class="mactions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="submit-btn" onclick="submitChangePIN()">Save PIN</button></div>`;
}
async function submitChangePIN(){
  const oldPin=document.getElementById('f-old-pin')?.value;
  const newPin=document.getElementById('f-new-pin')?.value;
  const newPin2=document.getElementById('f-new-pin2')?.value;
  const errEl=document.getElementById('f-pin-err');
  if(oldPin!==currentSession?.pin){errEl.textContent='Current PIN is incorrect';return;}
  if(!newPin||newPin.length<4){errEl.textContent='New PIN must be at least 4 digits';return;}
  if(newPin!==newPin2){errEl.textContent='PINs do not match';return;}
  const btn=document.getElementById('submit-btn');btn.textContent='Saving…';btn.disabled=true;
  try{
    await updatePage(currentSession.id,{PIN:wp('text',newPin)});
    currentSession.pin=newPin;
    saveSession(currentSession);
    // Update in loginUsers array
    const lu=loginUsers.find(u=>u.id===currentSession.id);
    if(lu)lu.pin=newPin;
    closeModal();toast('PIN changed ✓');
  }catch(e){errEl.textContent='Error: '+(e.message||e);btn.textContent='Save PIN';btn.disabled=false;}
}

function t(k){
  const lang=document.documentElement.lang;
  if(lang==='he')return HE[k]||k;
  if(lang==='fil')return PH[k]||k;
  return k;
}
function applyTranslations(){
  const lang=document.documentElement.lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.dataset.i18n;el.textContent=t(k);
  });
  // Update checkmarks in lang picker
  ['en','he','fil'].forEach(l=>{
    const el=document.getElementById('lc-'+l);
    if(el)el.textContent=lang===l?' ✓':'';
  });
  // Highlight active lang option
  document.querySelectorAll('.lang-opt').forEach(b=>{
    const onclick=b.getAttribute('onclick')||'';
    const match=onclick.match(/setLang\('(\w+)'\)/);
    if(match)b.classList.toggle('active-lang',match[1]===lang);
  });
  try{
    const titles={tasks:t('Tasks'),workorders:t('Work Orders'),cleaning:t('Cleaning'),mydash:t('My Dashboard'),notifications:t('Notifications')};
    const tb=document.getElementById('topbar-title');if(tb&&st.section)tb.textContent=titles[st.section]||st.section;
    const newLabel={tasks:t('+ New Task'),workorders:t('+ New Work Order'),cleaning:t('+ New Cleaning Job')}[st.section]||t('+ New');
    const nb=document.getElementById('new-btn');if(nb)nb.textContent=newLabel;
    const nbm=document.getElementById('new-btn-m');if(nbm)nbm.textContent=newLabel;
    const cp=document.getElementById('dp-comment-input');if(cp)cp.placeholder=t('Add a comment…');
  }catch{}
  try{renderSection();}catch(e){}
}
function openProfileMenu(btn){
  const popup=document.getElementById('profile-popup');
  if(!popup)return;
  if(popup.style.display==='block'){popup.style.display='none';return;}
  popup.style.display='block';
  const rect=btn.getBoundingClientRect();
  const ph=popup.offsetHeight||180;
  const top=rect.bottom+6;
  const left=Math.max(6,rect.right-220);
  popup.style.top=top+'px';popup.style.left=left+'px';
  setTimeout(()=>{
    function outside(e){if(!popup.contains(e.target)&&e.target!==btn){popup.style.display='none';document.removeEventListener('click',outside);}}
    document.addEventListener('click',outside);
  },10);
}
let _langPickerAnchor=null;
function openLangPicker(btn){
  const popup=document.getElementById('lang-picker-popup');
  if(!popup)return;
  if(popup.style.display==='block'){popup.style.display='none';_langPickerAnchor=null;return;}
  const rect=btn.getBoundingClientRect();
  popup.style.display='block';
  // Position: prefer above the button, align to right edge
  const ph=popup.offsetHeight||160;
  const top=rect.top-ph-6<0?rect.bottom+6:rect.top-ph-6;
  popup.style.top=top+'px';
  popup.style.left=Math.max(6,rect.right-180)+'px';
  _langPickerAnchor=btn;
  applyTranslations();
  // Close on outside click
  setTimeout(()=>{
    function outside(e){if(!popup.contains(e.target)&&e.target!==btn){popup.style.display='none';document.removeEventListener('click',outside);}}
    document.addEventListener('click',outside);
  },10);
}
function setLang(lang){
  const html=document.documentElement;
  const dir=lang==='he'?'rtl':'ltr';
  html.lang=lang;html.dir=dir;
  localStorage.setItem('ops_lang',lang);localStorage.setItem('ops_dir',dir);
  document.getElementById('lang-picker-popup').style.display='none';
  applyTranslations();
}
function initLang(){
  const savedLang=localStorage.getItem('ops_lang')||'en';
  const savedDir=localStorage.getItem('ops_dir')||'ltr';
  document.documentElement.lang=savedLang;
  document.documentElement.dir=savedDir;
  applyTranslations();
}

/* ── Mobile detection (JS-driven, overrides CSS) ────────── */
function applyMobile(){
  const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||window.innerWidth<=700;
  const html=document.documentElement;
  html.classList.toggle('mobile',isMobile);
  const sidebar=document.querySelector('.sidebar');
  const mobileNav=document.getElementById('mobile-nav');
  const body=document.body;
  if(isMobile){
    if(sidebar)sidebar.style.setProperty('display','none','important');
    if(mobileNav)mobileNav.style.setProperty('display','flex','important');
    body.style.overflow='auto';
  }else{
    if(sidebar)sidebar.style.removeProperty('display');
    if(mobileNav)mobileNav.style.setProperty('display','none','important');
    body.style.overflow='';
  }
}
window.addEventListener('resize',()=>{applyMobile();try{setSection(st.section);}catch(e){}});

/* ── Init ───────────────────────────────────────────────── */
applyMobile();
initLang();
loadSession();
if(currentSession){bootApp();}else{showLoginScreen();}
// Re-apply after app boots (DOM fully populated)
setTimeout(()=>{applyMobile();applyTranslations();},100);
</script>
