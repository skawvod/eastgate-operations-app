<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Ops Hub</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen" style="display:none;position:relative;">
  <button class="lang-globe login-lang" onclick="openLangPicker(this)" title="Language">🌍</button>
  <div class="login-logo">🏢</div>
  <div class="login-title" data-i18n="Property Ops">Property Ops</div>
  <div class="login-sub" data-i18n="Sign in to continue">Sign in to continue</div>
  <div class="login-form-wrap">
    <div>
      <label style="font-size:12px;color:#666;font-weight:500;display:block;margin-bottom:4px;" data-i18n="Username">Username</label>
      <input class="login-text-input" id="ls-username" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="Your name" onkeydown="if(event.key==='Enter')document.getElementById('ls-pin-input').focus()">
    </div>
    <div>
      <label style="font-size:12px;color:#666;font-weight:500;display:block;margin-bottom:4px;" data-i18n="PIN">PIN</label>
      <input class="login-pin-input" style="width:100%;font-size:20px;letter-spacing:8px;text-align:center;" type="password" inputmode="numeric" maxlength="8" id="ls-pin-input" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-pin-error" id="ls-pin-error"></div>
    <button class="login-sign-btn" onclick="doLogin()" data-i18n="Sign in">Sign in</button>
  </div>
</div>

<!-- CLEANER VIEW -->
<div id="cleaner-view" style="display:none;flex-direction:column;overflow:hidden;background:#f4f4f3;height:100vh;">
  <div class="cleaner-header">
    <div class="cleaner-logo">🏢</div>
    <div class="cleaner-header-title" data-i18n="Property Ops">Property Ops</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="lang-globe" onclick="openLangPicker(this)" title="Language">🌍</button>
      <div id="cv-av" class="cleaner-user-av lav-green" style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;"></div>
      <span id="cv-name" style="font-size:12px;font-weight:500;"></span>
      <button class="cleaner-signout" onclick="openChangePIN()" title="Change PIN">🔑 PIN</button>
      <button class="cleaner-signout" onclick="logout()" data-i18n="Sign out">Sign out</button>
    </div>
  </div>
  <div class="cv-tab-bar">
    <button id="cv-tab-dash" class="cv-tab-btn active" onclick="setCleanerTab('dash')" data-i18n="My Dashboard">My Dashboard</button>
    <button id="cv-tab-jobs" class="cv-tab-btn" onclick="setCleanerTab('jobs')" data-i18n="Cleaning Jobs">Cleaning Jobs</button>
  </div>
  <div class="cleaner-content" id="cv-content" style="flex:1;overflow-y:auto;padding:14px;">
    <div style="text-align:center;padding:40px;color:#aaa;">Loading…</div>
  </div>
</div>

<!-- MOBILE BOTTOM NAV (main app only) -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="mobile-nav-btn" id="mnav-mydash" onclick="setSection('mydash')"><span class="mnav-pill">📊</span><span data-i18n="Dashboard">Dashboard</span></button>
  <button class="mobile-nav-btn" id="mnav-notifications" onclick="setSection('notifications')"><span class="mnav-pill">🔔</span><span data-i18n="Notifications">Notifs</span></button>
  <button class="mobile-nav-btn" id="mnav-tasks" onclick="setSection('tasks')"><span class="mnav-pill">📋</span><span data-i18n="Tasks">Tasks</span></button>
  <button class="mobile-nav-btn" id="mnav-workorders" onclick="setSection('workorders')"><span class="mnav-pill">🔧</span><span data-i18n="Work Orders">Work</span></button>
  <button class="mobile-nav-btn" id="mnav-cleaning" onclick="setSection('cleaning')"><span class="mnav-pill">🧹</span><span data-i18n="Cleaning">Cleaning</span></button>
</nav>

<!-- MAIN APP -->
<div class="app" id="main-app" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏢</div><span data-i18n="Property Ops">Property Ops</span></div>
    <div class="sec-label" data-i18n="Workspace">Workspace</div>
    <button class="nav-btn" id="nav-mydash" onclick="setSection('mydash')"><span class="nav-icon">📊</span><span data-i18n="My Dashboard">My Dashboard</span></button>
    <button class="nav-btn" id="nav-notifications" onclick="setSection('notifications')"><span class="nav-icon">🔔</span><span id="notif-badge-sb" data-i18n="Notifications">Notifications</span></button>
    <button class="nav-btn" id="nav-tasks" onclick="setSection('tasks')"><span class="nav-icon">📋</span><span data-i18n="Tasks">Tasks</span></button>
    <button class="nav-btn" id="nav-workorders" onclick="setSection('workorders')"><span class="nav-icon">🔧</span><span data-i18n="Work Orders">Work Orders</span></button>
    <button class="nav-btn" id="nav-cleaning" onclick="setSection('cleaning')"><span class="nav-icon">🧹</span><span data-i18n="Cleaning">Cleaning</span></button>
    <div class="sidebar-user">
      <div id="sb-av" class="avatar av-a" style="width:26px;height:26px;font-size:10px;"></div>
      <div style="flex:1;min-width:0;"><div class="sidebar-user-name" id="sb-name"></div><div class="sidebar-user-role" id="sb-role"></div></div>
      <button class="btn-signout" onclick="openChangePIN()" title="Change PIN" style="margin-right:3px;">🔑</button>
      <button class="btn-signout" onclick="logout()" data-i18n="Sign out">Sign out</button>
    </div>
  </aside>
  <main class="main" id="main-content">
    <div class="topbar">
      <!-- Row 1: always visible -->
      <div class="topbar-r1">
        <div class="topbar-title" id="topbar-title">Tasks</div>
        <!-- Desktop right: refresh + view toggle + new + lang -->
        <div class="topbar-right">
          <button class="btn" onclick="loadAll()" data-i18n="↻ Refresh">↻ Refresh</button>
          <div class="view-toggle" id="view-toggle-d">
            <button class="vt-btn active" id="vt-board" onclick="setView('board')" data-i18n="⊞ Board">⊞ Board</button>
            <button class="vt-btn" id="vt-list" onclick="setView('list')" data-i18n="☰ List">☰ List</button>
          </div>
          <button class="btn btn-primary" id="new-btn" onclick="openNewModal()">+ New</button>
          <button class="lang-globe" onclick="openLangPicker(this)" title="Language">🌍</button>
        </div>
        <!-- Mobile right: lang + profile avatar -->
        <div class="topbar-mobile-right">
          <button class="lang-globe" onclick="openLangPicker(this)" title="Language">🌍</button>
          <button class="topbar-av-btn lav-purple" id="topbar-av" onclick="openProfileMenu(this)" title="Account">?</button>
        </div>
      </div>
      <!-- Row 2: mobile only — view toggle + new button -->
      <div class="topbar-r2" id="topbar-r2">
        <div class="view-toggle" id="view-toggle">
          <button class="vt-btn" id="vt-board-m" onclick="setView('board')" data-i18n="⊞ Board">⊞ Board</button>
          <button class="vt-btn" id="vt-list-m" onclick="setView('list')" data-i18n="☰ List">☰ List</button>
        </div>
        <button class="btn btn-primary" id="new-btn-m" style="margin-left:auto;" onclick="openNewModal()">+ New</button>
      </div>
    </div>
    <div class="guesty-panel" id="guesty-panel">
      <div class="guesty-panel-tabs">
        <button class="guesty-panel-tab active" id="gpt-status" onclick="setGuestyPanelTab('status')" data-i18n="Property Status">🏠 Property Status</button>
        <button class="guesty-panel-tab" id="gpt-calendar" onclick="setGuestyPanelTab('calendar')" data-i18n="Guesty Calendar">📅 Guesty Calendar</button>
      </div>
      <div class="guesty-panel-content" id="guesty-panel-content"></div>
    </div>
    <div class="content" id="main-section"><div class="loading-msg">Loading…</div></div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-head">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="detail-head-title" id="dp-title"></div>
        <a id="dp-notion-link" href="#" target="_blank" style="font-size:11px;color:#7F77DD;text-decoration:none;flex-shrink:0;">Open in Notion ↗</a>
      </div>
      <div class="detail-body" id="dp-body"></div>
    </div>
  </main>
</div>
<div class="overlay" id="modal-overlay" style="display:none;"><div class="modal" id="modal-box"></div></div>
<div class="toast" id="toast"></div>

<!-- Profile popup + language picker -->
<div id="profile-popup">
  <div class="profile-popup-header">
    <div class="profile-popup-name" id="pp-name"></div>
    <div class="profile-popup-role" id="pp-role"></div>
  </div>
  <button class="profile-popup-btn" onclick="document.getElementById('profile-popup').style.display='none';openChangePIN()">🔑 <span data-i18n="Change PIN">Change PIN</span></button>
  <button class="profile-popup-btn danger" onclick="document.getElementById('profile-popup').style.display='none';logout()">🚪 <span data-i18n="Sign out">Sign out</span></button>
</div>
<div id="lang-picker-popup">
  <button class="lang-opt" onclick="setLang('en')"><span>🇺🇸</span> English<span class="lang-check" id="lc-en"></span></button>
  <button class="lang-opt" onclick="setLang('he')"><span>🇮🇱</span> עברית<span class="lang-check" id="lc-he"></span></button>
  <button class="lang-opt" onclick="setLang('fil')"><span>🇵🇭</span> Filipino<span class="lang-check" id="lc-fil"></span></button>
</div>

<!-- Scripts — load order matters (all globals, no modules) -->
<script src="js/api.js"></script>
<script src="js/constants.js"></script>
<script src="js/lang.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/detail.js"></script>
<script src="js/modals.js"></script>
<script src="js/guesty.js"></script>
<script src="js/notifications.js"></script>
<script src="js/cleaner.js"></script>
<script src="js/checklist.js"></script>
</body>
</html>
